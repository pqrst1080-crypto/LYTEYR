<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRL — Access Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#020408;--deep:#050d1a;--panel:#0a1628;--glass:rgba(10,22,44,0.85);
  --cyan:#00e5ff;--violet:#7c3aed;--plasma:#a78bfa;--white:#e8f4ff;--muted:#6b8fac;
  --glow-cyan:0 0 20px rgba(0,229,255,0.4);--glow-v:0 0 20px rgba(124,58,237,0.5);
  --error:#f87171;--success:#34d399;
}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--white);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh;display:flex;flex-direction:column;}

/* CURSOR */
#cursor{position:fixed;width:12px;height:12px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.1s;mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(0,229,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s ease;}

/* CANVAS */
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.4;}

/* SCAN LINE */
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.006) 2px,rgba(0,229,255,0.006) 4px);pointer-events:none;z-index:2;}

/* LOADER */
#loader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--void);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;transition:opacity 0.8s ease;}
#loader.hidden{opacity:0;pointer-events:none;}
.loader-ring{width:80px;height:80px;border:2px solid rgba(0,229,255,0.1);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
.loader-text{font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:1000;padding:1.2rem 3rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(2,4,8,0.6);border-bottom:1px solid rgba(0,229,255,0.08);}
.logo{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:var(--cyan);letter-spacing:3px;text-decoration:none;}
.logo span{color:var(--plasma);font-weight:400;}
.nav-back{color:var(--muted);text-decoration:none;font-size:0.8rem;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.3s;font-family:'Rajdhani',sans-serif;}
.nav-back:hover{color:var(--cyan);}

/* MAIN */
main{position:relative;z-index:3;flex:1;display:flex;align-items:center;justify-content:center;padding:120px 2rem 4rem;}

/* AUTH CONTAINER */
.auth-wrap{width:100%;max-width:480px;}

.auth-header{text-align:center;margin-bottom:2.5rem;}
.auth-tag{font-family:'Rajdhani',sans-serif;font-size:0.8rem;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:0.75rem;}
.auth-title{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#e8f4ff 0%,#00e5ff 50%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}

/* TAB SWITCHER */
.tab-bar{display:flex;gap:0;margin-bottom:2rem;border:1px solid rgba(0,229,255,0.15);border-radius:3px;overflow:hidden;}
.tab-btn{flex:1;padding:0.85rem;background:transparent;color:var(--muted);font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;letter-spacing:2px;border:none;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
.tab-btn.active{background:rgba(0,229,255,0.08);color:var(--cyan);box-shadow:inset 0 -2px 0 var(--cyan);}
.tab-btn:hover:not(.active){color:var(--white);}

/* CARD */
.auth-card{background:var(--glass);border:1px solid rgba(0,229,255,0.12);border-radius:4px;padding:2.5rem;backdrop-filter:blur(20px);position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--cyan),var(--violet),transparent);}

/* FORM PANELS */
.form-panel{display:none;}
.form-panel.active{display:block;}

/* GOOGLE BTN */
.google-btn{width:100%;padding:0.9rem 1.5rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);border-radius:3px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.75rem;transition:all 0.3s;margin-bottom:1.5rem;}
.google-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3);transform:translateY(-1px);}
.google-icon{width:20px;height:20px;flex-shrink:0;}

/* DIVIDER */
.or-divider{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:rgba(0,229,255,0.1);}
.or-divider span{color:var(--muted);font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}

/* FORM FIELDS */
.field-group{margin-bottom:1.25rem;}
.field-label{font-family:'Rajdhani',sans-serif;font-size:0.78rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:0.5rem;display:block;}
.field-input{width:100%;background:rgba(5,13,26,0.8);border:1px solid rgba(0,229,255,0.15);padding:0.9rem 1.1rem;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:0.9rem;border-radius:2px;outline:none;transition:all 0.3s;}
.field-input:focus{border-color:var(--cyan);box-shadow:var(--glow-cyan);}
.field-input.error-state{border-color:var(--error);box-shadow:0 0 12px rgba(248,113,113,0.2);}
.field-input.success-state{border-color:var(--success);}

/* PASSWORD WRAPPER */
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:0;transition:color 0.2s;}
.pw-toggle:hover{color:var(--cyan);}

/* PASSWORD STRENGTH */
.pw-strength{margin-top:0.6rem;}
.pw-bars{display:flex;gap:4px;margin-bottom:0.4rem;}
.pw-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.06);transition:background 0.3s;}
.pw-bar.weak{background:var(--error);}
.pw-bar.medium{background:#fb923c;}
.pw-bar.strong{background:#facc15;}
.pw-bar.great{background:var(--success);}
.pw-label{font-size:0.75rem;color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:1px;}

/* REQUIREMENTS */
.pw-reqs{margin-top:0.75rem;display:flex;flex-direction:column;gap:0.3rem;}
.req-item{display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-weight:300;transition:color 0.3s;}
.req-item.met{color:var(--success);}
.req-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background 0.3s;flex-shrink:0;}
.req-item.met .req-dot{background:var(--success);}

/* SUBMIT BTN */
.submit-btn{width:100%;padding:1rem;background:var(--cyan);color:#020408;font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:700;letter-spacing:2px;border:none;border-radius:2px;cursor:pointer;transition:all 0.3s;margin-top:0.75rem;text-transform:uppercase;}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--glow-cyan);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.submit-btn.loading{opacity:0.6;pointer-events:none;}

/* STATUS */
.form-status{display:none;padding:0.9rem 1.2rem;border-radius:2px;font-size:0.85rem;margin-top:1rem;font-family:'Space Grotesk',sans-serif;line-height:1.5;}
.form-status.success{display:block;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.3);color:var(--success);}
.form-status.error{display:block;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);color:var(--error);}

/* FOOTER */
footer{position:relative;z-index:3;padding:1.5rem 3rem;border-top:1px solid rgba(0,229,255,0.06);display:flex;justify-content:center;align-items:center;}
.footer-copy{color:var(--muted);font-size:0.78rem;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}

/* ANIMATIONS */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.auth-wrap{animation:fadeIn 0.6s ease both;animation-delay:0.1s;opacity:0;}

@media(max-width:600px){
  nav{padding:1rem 1.5rem;}
  main{padding:100px 1rem 3rem;}
  .auth-card{padding:1.75rem 1.25rem;}
  .auth-title{font-size:1.4rem;}
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Authenticating Systems...</div>
</div>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="particle-canvas"></canvas>
<div class="scanline"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">AG<span>RL</span></a>
  <a href="index.html" class="nav-back">← Return to Base</a>
</nav>

<!-- MAIN -->
<main>
  <div class="auth-wrap">
    <div class="auth-header">
      <div class="auth-tag">Access Portal</div>
      <h1 class="auth-title">Secure Entry<br>Point</h1>
    </div>

    <!-- TAB SWITCHER -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="auth-card">

      <!-- ===== LOGIN PANEL ===== -->
      <div class="form-panel active" id="panel-login">

        <!-- Google Login -->
        <button class="google-btn" onclick="handleGoogleAuth('login')">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="or-divider"><span>or</span></div>

        <div class="field-group">
          <label class="field-label" for="login-email">Email Address</label>
          <input class="field-input" type="email" id="login-email" placeholder="researcher@agrl.org" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-label" for="login-password">Password</label>
          <div class="pw-wrap">
            <input class="field-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            <button class="pw-toggle" type="button" onclick="togglePw('login-password', this)" title="Show/hide password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-status" id="login-status"></div>
        <button class="submit-btn" id="login-btn" onclick="handleLogin()">Authenticate</button>
      </div>

      <!-- ===== SIGNUP PANEL ===== -->
      <div class="form-panel" id="panel-signup">

        <!-- Google Signup -->
        <button class="google-btn" onclick="handleGoogleAuth('signup')">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign Up with Google
        </button>

        <div class="or-divider"><span>or</span></div>

        <div class="field-group">
          <label class="field-label" for="signup-name">Full Name</label>
          <input class="field-input" type="text" id="signup-name" placeholder="Dr. R. Menon" autocomplete="name">
        </div>
        <div class="field-group">
          <label class="field-label" for="signup-email">Email Address</label>
          <input class="field-input" type="email" id="signup-email" placeholder="researcher@agrl.org" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-label" for="signup-password">Password</label>
          <div class="pw-wrap">
            <input class="field-input" type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password" oninput="checkStrength(this.value)">
            <button class="pw-toggle" type="button" onclick="togglePw('signup-password', this)" title="Show/hide password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <!-- Strength meter -->
          <div class="pw-strength">
            <div class="pw-bars">
              <div class="pw-bar" id="bar1"></div>
              <div class="pw-bar" id="bar2"></div>
              <div class="pw-bar" id="bar3"></div>
              <div class="pw-bar" id="bar4"></div>
            </div>
            <div class="pw-label" id="strength-label">Enter a password</div>
          </div>

          <!-- Requirements -->
          <div class="pw-reqs">
            <div class="req-item" id="req-len"><div class="req-dot"></div>Minimum 8 characters</div>
            <div class="req-item" id="req-upper"><div class="req-dot"></div>At least one uppercase letter</div>
            <div class="req-item" id="req-lower"><div class="req-dot"></div>At least one lowercase letter</div>
            <div class="req-item" id="req-num"><div class="req-dot"></div>At least one number</div>
            <div class="req-item" id="req-special"><div class="req-dot"></div>At least one special character (!@#$%^&*)</div>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="signup-confirm">Confirm Password</label>
          <div class="pw-wrap">
            <input class="field-input" type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password">
            <button class="pw-toggle" type="button" onclick="togglePw('signup-confirm', this)" title="Show/hide password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-status" id="signup-status"></div>
        <button class="submit-btn" id="signup-btn" onclick="handleSignup()">Create Account</button>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /auth-wrap -->
</main>

<footer>
  <div class="footer-copy">© 2025 AGRL — Anti-Gravity Research Laboratory</div>
</footer>

<script>
// =============================================
// SHEETDB CONFIGURATION
// =============================================
// 1. Go to https://sheetdb.io and sign up (free)
// 2. Create a Google Sheet with these headers in Row 1:
//    | timestamp | name | email | auth_method | role |
// 3. In SheetDB, click "Add API" → connect your sheet
// 4. Replace the URL below with your SheetDB API URL
// =============================================
const SHEETDB_URL = 'https://sheetdb.io/api/v1/33sfm7njnpk56';

// =============================================
// GOOGLE OAUTH CONFIGURATION
// =============================================
// 1. Go to https://console.cloud.google.com
// 2. Create a project → APIs & Services → Credentials
// 3. Create OAuth 2.0 Client ID (Web Application)
// 4. Add your domain to Authorized Origins
// 5. Replace YOUR_GOOGLE_CLIENT_ID below
// =============================================
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

// ---- TAB SWITCHER ----
function switchTab(tab) {
  ['login','signup'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

// ---- SHOW/HIDE PASSWORD ----
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

// ---- PASSWORD STRENGTH CHECKER ----
const reqs = {
  len:     v => v.length >= 8,
  upper:   v => /[A-Z]/.test(v),
  lower:   v => /[a-z]/.test(v),
  num:     v => /[0-9]/.test(v),
  special: v => /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v),
};

function checkStrength(val) {
  let score = 0;
  for (const [key, fn] of Object.entries(reqs)) {
    const el = document.getElementById('req-' + key);
    const met = fn(val);
    el.classList.toggle('met', met);
    if (met) score++;
  }

  const bars = ['bar1','bar2','bar3','bar4'];
  const levels = ['','weak','medium','strong','great'];
  const labels = ['Enter a password','Too weak','Getting there','Almost strong','Field-grade ✓'];
  bars.forEach((id, i) => {
    const bar = document.getElementById(id);
    bar.className = 'pw-bar' + (i < score ? ' ' + levels[score] : '');
  });
  document.getElementById('strength-label').textContent = val.length ? labels[score] : 'Enter a password';
}

function allReqsMet(val) {
  return Object.values(reqs).every(fn => fn(val));
}

// ---- STATUS HELPER ----
function setStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'form-status ' + type;
  el.textContent = msg;
}

// ---- SHEETDB SUBMISSION ----
async function sendToSheetDB(data) {
  if (SHEETDB_URL.includes('YOUR_SHEETDB')) {
    console.warn('SheetDB not configured — skipping storage.');
    return;
  }
  const res = await fetch(SHEETDB_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: [data] })
  });
  if (!res.ok) throw new Error('SheetDB error: ' + res.status);
}

// ---- HANDLE LOGIN (email/password) ----
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');

  if (!email || !password) {
    return setStatus('login-status', 'error', '⚠ Please enter your email and password.');
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return setStatus('login-status', 'error', '⚠ Please enter a valid email address.');
  }

  btn.textContent = 'Authenticating...';
  btn.classList.add('loading');

  try {
    // NOTE: For a real login, validate credentials against your backend/auth system.
    // This demo logs the login attempt to SheetDB for tracking purposes.
    await sendToSheetDB({
      timestamp: new Date().toISOString(),
      name: '—',
      email,
      auth_method: 'email_login_attempt',
      role: 'user'
    });
    setStatus('login-status', 'success', '✓ Login recorded. Redirecting...');
    btn.textContent = 'Authenticated ✓';
    // Redirect after success — replace with your dashboard URL
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  } catch (err) {
    btn.textContent = 'Authenticate';
    btn.classList.remove('loading');
    setStatus('login-status', 'error', '⚠ Authentication failed. Please try again.');
    console.error(err);
  }
}

// ---- HANDLE SIGNUP (email/password) ----
async function handleSignup() {
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm  = document.getElementById('signup-confirm').value;
  const btn      = document.getElementById('signup-btn');

  if (!name || !email || !password || !confirm) {
    return setStatus('signup-status', 'error', '⚠ All fields are required.');
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return setStatus('signup-status', 'error', '⚠ Please enter a valid email address.');
  }
  if (!allReqsMet(password)) {
    return setStatus('signup-status', 'error', '⚠ Password does not meet all requirements.');
  }
  if (password !== confirm) {
    document.getElementById('signup-confirm').classList.add('error-state');
    return setStatus('signup-status', 'error', '⚠ Passwords do not match.');
  }
  document.getElementById('signup-confirm').classList.remove('error-state');

  btn.textContent = 'Creating Account...';
  btn.classList.add('loading');

  try {
    await sendToSheetDB({
      timestamp:   new Date().toISOString(),
      name,
      email,
      auth_method: 'email_signup',
      role:        'user'
    });
    setStatus('signup-status', 'success', '✓ Account created! Welcome to AGRL. Redirecting...');
    btn.textContent = 'Account Created ✓';
    setTimeout(() => { window.location.href = 'index.html'; }, 1800);
  } catch (err) {
    btn.textContent = 'Create Account';
    btn.classList.remove('loading');
    setStatus('signup-status', 'error', '⚠ Registration failed. Please try again.');
    console.error(err);
  }
}

// ---- GOOGLE OAUTH ----
// This uses the Google Identity Services (GIS) popup flow.
// Make sure you've added the GIS script and configured your Client ID above.
function handleGoogleAuth(mode) {
  if (GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
    setStatus(mode + '-status', 'error', '⚠ Google OAuth not configured yet. Add your Google Client ID in the script.');
    // Show the status div even if it's in the other panel
    document.getElementById(mode + '-status').style.display = 'block';
    return;
  }

  if (typeof google === 'undefined') {
    setStatus(mode + '-status', 'error', '⚠ Google Identity Services not loaded. Ensure you have an internet connection.');
    return;
  }

  google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'email profile',
    callback: async (response) => {
      if (response.error) {
        setStatus(mode + '-status', 'error', '⚠ Google sign-in failed: ' + response.error);
        return;
      }
      // Fetch user profile with the access token
      try {
        const profileRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + response.access_token }
        });
        const profile = await profileRes.json();
        await sendToSheetDB({
          timestamp:   new Date().toISOString(),
          name:        profile.name || '—',
          email:       profile.email,
          auth_method: 'google_' + mode,
          role:        'user'
        });
        setStatus(mode + '-status', 'success', '✓ Signed in as ' + profile.name + '. Redirecting...');
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      } catch (err) {
        setStatus(mode + '-status', 'error', '⚠ Could not retrieve Google profile. Try again.');
        console.error(err);
      }
    }
  }).requestAccessToken();
}

// PARTICLE CANVAS
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const particles = [];
for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
    r: Math.random() * 1.2 + 0.3,
    c: Math.random() > 0.5 ? 'rgba(0,229,255,' : 'rgba(124,58,237,',
    o: Math.random() * 0.4 + 0.1
  });
}
function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.c + p.o + ')';
    ctx.fill();
  });
  particles.forEach((p, i) => {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = p.x - particles[j].x, dy = p.y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,229,255,${0.05 * (1 - dist / 100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();
